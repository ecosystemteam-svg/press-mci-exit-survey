<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exit Survey - UNDERSTAND MCI 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid #D4007A; }
        h2 { color: #D4007A; text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.95rem; }
        input[type="text"], input[type="email"], select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .grid-rating { display: flex; justify-content: space-between; gap: 5px; margin-top: 5px; }
        .grid-rating label { font-size: 0.8rem; text-align: center; flex: 1; }
        button { width: 100%; padding: 15px; background-color: #D4007A; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        button:hover { background-color: #b00065; }
        .status { text-align: center; margin-top: 15px; font-weight: bold; display: none; }
        hr { border: 0; border-top: 1px solid #eee; margin: 30px 0; }
        .section-title { color: #888; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Exit Survey<br><small style="font-size: 0.7em; color: #666;">Press Conference UNDERSTAND MCI 2026</small></h2>
    
    <form id="surveyForm">
        <div class="section-title">ข้อมูลส่วนตัว</div>
        <div class="form-group">
            <label>NPS Score (0-10)</label>
            <input type="number" name="nps" min="0" max="10" placeholder="คะแนนความพึงพอใจ" required>
        </div>
        
        <div class="form-group">
            <label>เพศ</label>
            <select name="gender">
                <option value="">เลือกเพศ</option>
                <option value="ชาย">ชาย</option>
                <option value="หญิง">หญิง</option>
                <option value="ไม่ระบุ">ไม่ระบุ</option>
            </select>
        </div>

        <div class="form-group">
            <label>อายุ</label>
            <input type="text" name="age" placeholder="เช่น 35">
        </div>

        <div class="form-group">
            <label>บทบาท/วิชาชีพ</label>
            <input type="text" name="role" placeholder="เช่น แพทย์, สื่อมวลชน, ประชาชนทั่วไป">
        </div>

        <hr>
        <div class="section-title">ประเมินกิจกรรม (คะแนน 1-5)</div>
        <div class="form-group"><label>1. Immersive Experience</label><input type="number" name="r1" min="1" max="5"></div>
        <div class="form-group"><label>2. Executive Talk</label><input type="number" name="r2" min="1" max="5"></div>
        <div class="form-group"><label>3. The Power of Synergy</label><input type="number" name="r3" min="1" max="5"></div>
        <div class="form-group"><label>4. hhc Audiobook</label><input type="number" name="r4" min="1" max="5"></div>
        <div class="form-group"><label>5. Beyond Forgetting</label><input type="number" name="r5" min="1" max="5"></div>
        <div class="form-group"><label>6. Workshop: Gallery of Memory</label><input type="number" name="r6" min="1" max="5"></div>
        <div class="form-group"><label>7. สถานที่ (The Botanical House)</label><input type="number" name="r7" min="1" max="5"></div>

        <hr>
        <div class="section-title">ความคิดเห็นเพิ่มเติม</div>
        <div class="form-group">
            <label>ความเข้าใจเกี่ยวกับภาวะ MCI หลังร่วมงาน</label>
            <textarea name="mci_understand" rows="2"></textarea>
        </div>
        <div class="form-group">
            <label>แผนการดำเนินงานหลังจบงานนี้</label>
            <textarea name="action_plan" rows="2"></textarea>
        </div>
        <div class="form-group">
            <label>Takeaway ที่ได้รับจากงาน</label>
            <textarea name="takeaway" rows="2"></textarea>
        </div>

        <hr>
        <div class="section-title">ข้อมูลการติดต่อ (ถ้าต้องการให้ทีมงานติดต่อกลับ)</div>
        <div class="form-group"><label>ชื่อ-นามสกุล</label><input type="text" name="contact_name"></div>
        <div class="form-group"><label>องค์กร</label><input type="text" name="contact_org"></div>
        <div class="form-group"><label>เบอร์โทรศัพท์</label><input type="text" name="contact_phone"></div>
        <div class="form-group"><label>อีเมล</label><input type="email" name="contact_email"></div>

        <button type="submit" id="submitBtn">ส่งข้อมูล</button>
    </form>
    
    <div id="statusMsg" class="status"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxqKhT_PKdAjdo_MYc9Ri-IAPrWjNrI2_TzE2uUjMDkvlu4afa97snrQu37w3ZV55sq_g/exec";

    document.getElementById('surveyForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('statusMsg');
        
        btn.disabled = true;
        btn.innerText = "กำลังส่งข้อมูล...";
        status.style.display = "block";
        status.innerText = "กรุณารอสักครู่...";
        status.style.color = "#666";

        const formData = new FormData(this);
        const params = new URLSearchParams();
        params.append('action', 'submit');
        
        // วนลูปดึงค่าจากฟอร์มใส่ Parameter
        for (let pair of formData.entries()) {
            params.append(pair[0], pair[1]);
        }

        // ส่งข้อมูลแบบ GET (เพื่อเลี่ยงปัญหา CORS ที่พบบ่อยใน Apps Script)
        fetch(`${SCRIPT_URL}?${params.toString()}`, {
            method: 'GET',
            mode: 'no-cors' // สำคัญ: เพื่อให้ส่งผ่านได้โดยไม่ติดบล็อก Browser
        })
        .then(() => {
            status.innerText = "ส่งข้อมูลสำเร็จ! ขอบพระคุณสำหรับความคิดเห็นครับ";
            status.style.color = "green";
            btn.style.display = "none";
            document.getElementById('surveyForm').reset();
        })
        .catch(err => {
            status.innerText = "เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง";
            status.style.color = "red";
            btn.disabled = false;
            btn.innerText = "ส่งข้อมูล";
            console.error(err);
        });
    });
</script>

</body>
</html>
